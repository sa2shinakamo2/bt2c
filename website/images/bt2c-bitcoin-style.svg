<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Bitcoin-style circle background -->
  <circle cx="100" cy="100" r="90" fill="#F7931A" />
  
  <!-- Inner shadow for 3D effect -->
  <circle cx="100" cy="100" r="85" fill="#F7931A" stroke="#E78018" stroke-width="5" />
  
  <!-- B symbol with 2 incorporated -->
  <g transform="rotate(14, 100, 100)">
    <!-- Main B shape -->
    <path d="M100,35 
             C125,35 145,50 145,75 
             C145,90 135,100 125,105 
             C140,110 150,125 150,140 
             C150,165 130,180 100,180 
             L60,180 
             L60,35 
             L100,35 Z" 
          fill="#FFFFFF" />
    
    <!-- Inner cuts for the B -->
    <path d="M80,60 
             L80,90 
             L100,90 
             C110,90 115,85 115,75 
             C115,65 110,60 100,60 
             L80,60 Z 
             
             M80,115 
             L80,155 
             L105,155 
             C115,155 120,150 120,135 
             C120,120 115,115 105,115 
             L80,115 Z" 
          fill="#F7931A" />
    
    <!-- The "2" incorporated into the B -->
    <path d="M95,100 
             C105,100 110,105 110,115 
             C110,125 105,130 95,130 
             L90,130 
             L110,150 
             L110,155 
             L85,155 
             L85,145 
             L95,145 
             C100,145 105,140 105,130 
             C105,120 100,115 95,115 
             L85,115 
             L85,100 
             L95,100 Z" 
          fill="#FFFFFF" />
  </g>
</svg>
